# DETECTION: ai_token_exfiltration (CRITICAL)
# AI action with secret access receiving untrusted input
# Trigger: issue_comment (AI trigger) -> AI action reads secrets -> untrusted input flows in
name: AI Code Review with Secrets

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/review')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run AI Review
        uses: coderabbitai/ai-pr-reviewer@v1
        with:
          comment: ${{ github.event.comment.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
