# DETECTION: ai_code_injection (CRITICAL)
# AI action with write permissions receiving untrusted input in run/with blocks
# Trigger: pull_request_target -> AI action -> untrusted PR title in run command
name: AI PR Analysis

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: AI Code Analysis
        uses: sourcery-ai/sourcery-action@v1
        with:
          pr_title: ${{ github.event.pull_request.title }}
          pr_body: ${{ github.event.pull_request.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post Summary
        run: |
          echo "Reviewing PR: ${{ github.event.pull_request.title }}"
          echo "Description: ${{ github.event.pull_request.body }}"
