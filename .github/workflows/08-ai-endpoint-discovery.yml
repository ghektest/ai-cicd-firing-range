# PURPOSE: Julius AI endpoint extraction + probing
# This workflow references self-hosted AI services for endpoint discovery testing
# The OLLAMA_HOST value should be updated with the actual EC2 IP
name: AI Pipeline with Self-Hosted Models

on:
  push:
    branches: [main]

jobs:
  ai-pipeline:
    runs-on: ubuntu-latest
    env:
      # Primary: Ollama endpoint (update with real EC2 IP)
      OLLAMA_HOST: http://PLACEHOLDER_OLLAMA_IP:11434
      OLLAMA_API_BASE: http://PLACEHOLDER_OLLAMA_IP:11434
      # Secondary: Additional AI service references for extraction testing
      OPENAI_BASE_URL: https://api.openai.com/v1
      LLM_BASE_URL: http://PLACEHOLDER_OLLAMA_IP:11434/v1
    steps:
      - uses: actions/checkout@v4

      - name: Query AI Model
        run: |
          curl -s ${OLLAMA_HOST}/api/tags
          curl -s ${OLLAMA_HOST}/v1/models
          curl -s ${LLM_BASE_URL}/chat/completions \
            -d '{"model":"tinyllama","messages":[{"role":"user","content":"hello"}]}'
