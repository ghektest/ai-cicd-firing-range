# DETECTION: ai_code_injection / clinejection (CRITICAL)
# AI action configured with wildcard user access (allowed-users: "*")
# Zero-click attack vector discovered Feb 2026
name: AI Review Open Access

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: AI Review with Open Access
        uses: coderabbitai/ai-pr-reviewer@v1
        with:
          allowed-users: "*"
          review-comment: ${{ github.event.pull_request.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
